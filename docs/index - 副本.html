/* =========================================
       封面弹幕墙 & 悬浮 Twikoo 样式 (V3 终极版)
       ========================================= */
    
    /* 1. 右下角控制按钮组 */
    #danmaku-controls {
      position: fixed; right: 30px; bottom: 30px; z-index: 9999;
      display: flex; gap: 12px; align-items: center;
    }
    .danmaku-btn {
      color: white; border: none; padding: 10px 20px; border-radius: 30px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      cursor: pointer; font-weight: bold; transition: all 0.3s ease;
    }
    .danmaku-btn:hover { transform: translateY(-3px); }
    
    #danmaku-switch { background: rgba(0, 123, 232, 0.9); }
    #danmaku-send-btn { background: #4CAF50; display: none; } /* 默认隐藏发送按钮 */

    /* 2. 弹幕容器与单条弹幕 (增加头像排版) */
    #danmaku-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 998; overflow: hidden; display: none;
    }
    
    /* 胶囊底托排版 */
    .danmaku-item {
      position: absolute; display: flex; align-items: center; gap: 8px;
      padding: 4px 16px 4px 4px; /* 右侧留白，左侧紧贴头像 */
      background: rgba(0, 0, 0, 0.25); /* 半透明黑底，提升阅读性 */
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      border-radius: 50px; white-space: nowrap;
      will-change: transform;
    }
    
    /* 头像样式 */
    .danmaku-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      object-fit: cover; border: 1px solid rgba(255,255,255,0.4);
    }
    
    /* 文字样式 */
    .danmaku-text {
      font-size: 16px; font-weight: 500;
      color: rgba(255, 255, 255, 0.95);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
    }

    @keyframes danmaku-move {
      from { transform: translateX(100vw); }
      to { transform: translateX(-100%); }
    }

    /* 3. 悬浮输入框 */
    .danmaku-modal {
      position: fixed; bottom: 15%; left: 50%; width: 90%; max-width: 600px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 20px 30px 10px 30px; border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 10000;
      opacity: 0; visibility: hidden;
      transform: translate(-50%, 50px) scale(0.8);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .danmaku-modal.active {
      opacity: 1; visibility: visible; transform: translate(-50%, 0) scale(1);
    }
    .twikoo-modal-close {
      position: absolute; top: 15px; right: 20px; font-size: 24px; 
      cursor: pointer; color: #666; transition: color 0.2s;
    }
    .twikoo-modal-close:hover { color: #ff4757; }

   /* ========================================================
       🚨 终极物理防御：彻底隐藏评论区与网址框
       ======================================================== */
       
    /* 1. 采用你的思路：给最外层容器加“紧箍咒”，强制截断！ */
    /* Twikoo 无法删除我们的 .danmaku-modal 外壳，我们在这里卡死高度 */
    .danmaku-modal {
      max-height: 250px !important; /* 限制最大高度，刚好够容纳输入框和按钮 */
      overflow: hidden !important;  /* 超出的评论区？直接物理“咔嚓”掉！ */
    }

    /* 2. 隐藏标题、评论列表（通过最外层父级类名穿透，不依赖 ID） */
    .danmaku-modal .tk-comments-title,
    .danmaku-modal .tk-comments-container,
    .danmaku-modal .tk-comments-no {
      display: none !important;
      visibility: hidden !important;
      height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      opacity: 0 !important;
    }

    /* 3. 精准爆破“网址”输入框（它是 .tk-meta-input 里的第 3 个元素） */
    .danmaku-modal .tk-meta-input > div:nth-child(3),
    .danmaku-modal .tk-meta-input > .el-input:nth-child(3) {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
      overflow: hidden !important;
    }

    /* 4. 优化排版：网址框没之后，让剩下的“昵称”和“邮箱”平分宽度，看着更饱满 */
    .danmaku-modal .tk-meta-input {
      display: flex !important;
      gap: 10px;
    }
    .danmaku-modal .tk-meta-input > div:nth-child(1),
    .danmaku-modal .tk-meta-input > div:nth-child(2) {
      flex: 1 !important;
      width: 50% !important;
    }

    /* 5. 隐藏表情(OwO)和图片上传按钮，保持弹幕纯文本输入的极简感 */
    .danmaku-modal .tk-action-icon {
      display: none !important;
      visibility: hidden !important;
      width: 0 !important;
      height: 0 !important;
    }
/* 👇 6. 新增：精准爆破“预览”按钮，只保留蓝色的“发送”按钮 👇 */
    .danmaku-modal .tk-preview,
    .danmaku-modal .tk-submit-action-icon {
      display: none !important;
      visibility: hidden !important;
      width: 0 !important;
      height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    .ios-card {

    .ios-card h2 { margin-top: 0 !important; border-bottom: none !important; font-size: 1.6em; color: #1d1d1f; }

    .ios-step {

    /* 3. 图片完美居中与阴影包裹 */
    .ios-img-box {
      text-align: center;
      margin: 30px 0;
      padding: 10px;
      background: #fbfbfd; /* 极浅的灰色底，衬托图片 */

    .ios-img-box img {
      max-width: 95%;

    }
    .ios-img-box img:hover { transform: scale(1.03); } /* 鼠标滑过图片 Q弹放大 */

    /* 4. 重点文字高亮 */
    .ios-highlight { color: #007aff; font-weight: 700; }

    .ios-note {

      border-radius: 0 12px 12px 0;
      color: #333;
      margin: 20px 0;
      font-size: 15px;
      line-height: 1.6;
    }

<!-- 网站运行时间 -->
 <script>
    function siteTime() {
      window.setTimeout("siteTime()", 1000);
      
      // 1. 设置你的部署日期（年, 月, 日, 时, 分, 秒）
      // 注意：月份从 0 开始计数，0代表1月，3代表4月，以此类推。
      // 比如 2024年4月13日 21:12:00 应该写成 Date.UTC(2026, 3, 13, 21, 12, 0)
      var t1 = Date.UTC(2026, 3, 22, 10, 0, 0); 
      
      var today = new Date();
      var t2 = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate(), today.getHours(), today.getMinutes(), today.getSeconds());
      var diff = t2 - t1;
      
      var seconds = 1000;
      var minutes = seconds * 60;
      var hours = minutes * 60;
      var days = hours * 24;
      var years = days * 365;
      
      var diffYears = Math.floor(diff / years);
      var diffDays = Math.floor((diff / days) - diffYears * 365);
      var diffHours = Math.floor((diff - (diffYears * 365 + diffDays) * days) / hours);
      var diffMinutes = Math.floor((diff - (diffYears * 365 + diffDays) * days - diffHours * hours) / minutes);
      var diffSeconds = Math.floor((diff - (diffYears * 365 + diffDays) * days - diffHours * hours - diffMinutes * minutes) / seconds);
      
      var documentElement = document.getElementById("sitetime");
      if(documentElement) {
        documentElement.innerHTML = "本站已安全运行 " + diffYears + " 年 " + diffDays + " 天 " + diffHours + " 小时 " + diffMinutes + " 分 " + diffSeconds + " 秒 ";
      }
    }
    siteTime();



  </script>





<!-- 弹幕功能 -->


<div id="danmaku-controls">
  <button id="danmaku-send-btn" class="danmaku-btn" onclick="toggleDanmakuModal()">💬 发送弹幕</button>
  <button id="danmaku-switch" class="danmaku-btn">✨ 开启弹幕</button>
</div>

<div id="danmaku-container"></div>

<div id="twikoo-modal" class="danmaku-modal">
  <span class="twikoo-modal-close" onclick="closeDanmakuModal()" title="收起输入框">×</span>
  <h3 style="margin-top: 0; text-align: center; color: #333; font-size: 1.1em;">发射弹幕 🚀</h3>
  <div id="tcomment-cover"></div>
</div>




  <script>
    // 配置你的 Twikoo 环境 ID
    const TWIKOO_ENV_ID = 'https://twikoo-backend-jwk0fa2se-fatswangs-projects.vercel.app';
    let danmakuActive = false;
    let danmakuTimer = null;
    let commentsData = [];

    const switchBtn = document.getElementById('danmaku-switch');
    const sendBtn = document.getElementById('danmaku-send-btn');
    const danmakuContainer = document.getElementById('danmaku-container');
    const modal = document.getElementById('twikoo-modal');
    let twikooCoverInited = false;

    // 获取最新评论数据 (提取头像和文本)
    function fetchComments() {
      twikoo.getRecentComments({
        envId: TWIKOO_ENV_ID,
        pageSize: 50, 
        includeReply: false 
      }).then(function (res) {
        // 将数据映射为包含 text 和 avatar 的对象数组
        commentsData = res.map(item => {
          return {
            text: item.commentText || item.comment,
            // 如果没有头像，使用 Cravatar 的默认神秘人头像
            avatar: item.avatar || 'https://cravatar.cn/avatar/?d=mp' 
          };
        });
        
        if(danmakuActive && commentsData.length > 0 && !danmakuTimer) {
          startDanmakuEngine();
        }
      }).catch(err => console.error("获取弹幕失败:", err));
    }

    // 弹幕发射引擎 (带头像渲染)
    function shootDanmaku() {
      if (!danmakuActive || commentsData.length === 0) return;
      
      // 随机抽取一条数据
      const data = commentsData[Math.floor(Math.random() * commentsData.length)];
      
      const el = document.createElement('div');
      el.className = 'danmaku-item';
      
      // 组装带头像的 HTML
      el.innerHTML = `
        <img src="${data.avatar}" class="danmaku-avatar" onerror="this.src='https://cravatar.cn/avatar/?d=mp'" />
        <span class="danmaku-text">${data.text}</span>
      `;
      
      const bottomPercent = 10 + Math.random() * 50; 
      el.style.bottom = bottomPercent + '%';
      
      // 随机文字颜色 (应用于 span)
      const colors = ['#ffffff', '#f8f9fa', '#e3f2fd', '#fff3e0', '#fce4ec'];
      el.querySelector('.danmaku-text').style.color = colors[Math.floor(Math.random() * colors.length)];
      
      const duration = 7 + Math.random() * 8;
      el.style.animation = `danmaku-move ${duration}s linear forwards`;
      danmakuContainer.appendChild(el);
      
      setTimeout(() => { el.remove(); }, duration * 1000);
    }

    function startDanmakuEngine() {
      if(danmakuTimer) clearInterval(danmakuTimer);
      danmakuTimer = setInterval(shootDanmaku, 1500);
    }

    // ✨ 开启/关闭 弹幕主开关逻辑
    switchBtn.addEventListener('click', () => {
      danmakuActive = !danmakuActive;
      if (danmakuActive) {
        // 开启状态
        switchBtn.innerText = '🚫 关闭弹幕';
        switchBtn.style.background = '#ff4757'; // 红色
        sendBtn.style.display = 'block'; // 显示发送按钮
        danmakuContainer.style.display = 'block';
        
        fetchComments(); // 每次开启时拉取最新数据
        // 【关键修改】：删除了 openDanmakuModal()，开启时不再自动弹输入框
        
      } else {
        // 关闭状态
        switchBtn.innerText = '✨ 开启弹幕';
        switchBtn.style.background = 'rgba(0, 123, 232, 0.9)'; // 蓝色
        sendBtn.style.display = 'none'; // 隐藏发送按钮
        danmakuContainer.style.display = 'none';
        
        if(danmakuTimer) {
          clearInterval(danmakuTimer);
          danmakuTimer = null;
        }
        closeDanmakuModal(); // 关闭弹幕时强制收起输入框
      }
    });

    // 🌟 核心逻辑：切换输入框 (发送弹幕 <-> 收起输入)
    function toggleDanmakuModal() {
      const isOpening = !modal.classList.contains('active');
      if (isOpening) {
        modal.classList.add('active');
        sendBtn.innerText = '🔼 收起输入'; // 弹出时改变按钮文字
        
        if(!twikooCoverInited) {
          twikoo.init({
            envId: TWIKOO_ENV_ID,
            el: '#tcomment-cover',
            path: '/cover-danmaku'
          });
          twikooCoverInited = true;
        }
      } else {
        closeDanmakuModal();
      }
    }

    // 单独提取收起逻辑，保证面板收起时按钮文字复原
    function closeDanmakuModal() {
      modal.classList.remove('active');
      sendBtn.innerText = '💬 发送弹幕'; // 恢复按钮文字
    }

    // 🚀 核心优化：实时刷新机制
    setInterval(() => {
      if(danmakuActive) fetchComments();
    }, 15000);

    // 监听提交按钮：发送成功后，自动收起面板并立即拉取数据
    document.body.addEventListener('click', function(e) {
      if (e.target.closest('.tk-submit-action') || e.target.closest('.el-button--primary')) {
         setTimeout(() => {
            fetchComments(); 
            closeDanmakuModal(); // 发送后自动关闭，文字也会自动变回"发送弹幕"
         }, 2000);
      }
    });
  </script>



</body>
