<script>
  window.$docsify = {
    name: "🌈 常胜将军王胖胖",
    nameLink: '/',
    coverpage: true,
    onlyCover: false,
    executeScript: true,
    loadSidebar: true,
    loadNavbar: true,
    autoHeader: true,
    auto2top: true,
    mergeNavbar: true,
    themeColor: '#007be8',  
    
    
    search: {
      paths: 'auto',
      placeholder: '🔍 搜索关键字...',
      noData: '😒 找不到结果',
      depth: 6,
    },

    pagination: {
      previousText: '上一篇',
      nextText: '下一篇',
      crossChapter: true
    },

    plugins: [
      // 1. Twikoo 评论系统注入
      function (hook, vm) {
        hook.doneEach(function() {
          var twikooContainer = document.getElementById('tcomment');
          if (twikooContainer) {
            twikoo.init({
              envId: 'https://twikoo-backend-jwk0fa2se-fatswangs-projects.vercel.app',
              el: '#tcomment',
              path: "/cover-danmaku",
            });
          }
        });
      },
      // 2. 标题固定格式控制插件
      function (hook, vm) {
        hook.doneEach(function () {
          const baseTitle = "常胜将军王胖胖 - 个人知识库 🌹";
          const pageName = document.querySelector('h1') ? document.querySelector('h1').innerText : '正文';
          if (vm.route.path === '/') {
            document.title = baseTitle + " - 首页";
          } else {
            document.title = baseTitle + " - " + pageName;
          }
        });
      },
      // 🌟 3. 新增：iOS 风格 MD 实时转换与悬浮目录插件 🌟
      function(hook, vm) {
        hook.afterEach(function(html, next) {
          // ⚠️ 步骤 1：检测并移除屏蔽标识符
          let showToc = true;
          if (html.includes('不展示目录')) {
            showToc = false;
            // 将页面中的标识符静默移除，不影响用户阅读
            html = html.replace(/<p>不展示目录<\/p>|不展示目录/g, '');
          }

          const parserDiv = document.createElement('div');
          parserDiv.innerHTML = html;
          const finalDiv = document.createElement('div');

          let currentCard = null;
          let titleSection = null;
          let tocData = [];

          Array.from(parserDiv.childNodes).forEach(node => {
            if (node.nodeType === 3 && node.textContent.trim() === '') return;
            const getNodeId = (n) => n.id || n.getAttribute('data-id') || 'ios-ref-' + Math.random().toString(36).substr(2, 5);

            if (node.tagName === 'H1') {
              const id = getNodeId(node);
              node.id = id;
              tocData.push({ level: 1, text: node.innerText, id: id });
              titleSection = document.createElement('div');
              titleSection.className = 'ios-title-section';
              titleSection.appendChild(node.cloneNode(true));
              finalDiv.appendChild(titleSection);
              return;
            }

            if (node.tagName === 'H2') {
              const id = getNodeId(node);
              node.id = id;
              tocData.push({ level: 2, text: node.innerText, id: id });
              currentCard = document.createElement('div');
              currentCard.className = 'ios-card';
              currentCard.appendChild(node.cloneNode(true));
              finalDiv.appendChild(currentCard);
              return;
            }

            const newNode = node.cloneNode(true);
            if (newNode.nodeType === 1) {
              newNode.querySelectorAll('code').forEach(c => {
                if (c.parentNode && c.parentNode.tagName !== 'PRE') {
                  const span = document.createElement('span');
                  span.className = 'ios-highlight';
                  span.innerHTML = c.innerHTML;
                  c.parentNode.replaceChild(span, c);
                }
              });
              if (newNode.tagName === 'P' && newNode.querySelector('img')) {
                const imgBox = document.createElement('div');
                imgBox.className = 'ios-img-box';
                newNode.querySelectorAll('img').forEach(img => imgBox.appendChild(img.cloneNode(true)));
                if (currentCard) currentCard.appendChild(imgBox);
                else finalDiv.appendChild(imgBox);
                return;
              }
            }
            if (currentCard) currentCard.appendChild(newNode);
            else finalDiv.appendChild(newNode);
          });

          // ⚠️ 步骤 2：条件渲染目录 DOM
          let tocHtml = '';
          if (showToc && tocData.length > 0) {
            tocHtml = `<div class="ios-toc-widget"><div class="ios-toc-header">📍 章节导览</div>`;
            tocData.forEach(item => {
              tocHtml += `<a href="javascript:void(0);" data-target-id="${item.id}" class="ios-toc-item" style="padding-left: ${item.level === 1 ? '8px' : '16px'}">${item.text}</a>`;
            });
            tocHtml += `</div>`;
          }
          next(tocHtml + finalDiv.innerHTML);
        });

        hook.doneEach(function() {
          // 每次切换页面时，先清理旧的滚动监听，防止内存泄漏
          if (window.iosScrollSpy) {
            window.removeEventListener('scroll', window.iosScrollSpy);
          }

          // ⚠️ 步骤 3：检测当前页面是否真的生成了目录结构
          const tocWidget = document.querySelector('.ios-toc-widget');
          if (!tocWidget) return; // 如果没有目录，直接 return，不消耗任何性能

          // 绑定点击跳转
          document.querySelectorAll('.ios-toc-item').forEach(link => {
            link.addEventListener('click', (e) => {
              e.preventDefault();
              const id = link.getAttribute('data-target-id');
              const targetEl = document.getElementById(id);
              if(targetEl) {
                const y = targetEl.getBoundingClientRect().top + window.pageYOffset - 30;
                window.scrollTo({top: y, behavior: 'smooth'});
              }
            });
          });

          // 绑定滚动监听
          window.iosScrollSpy = function() {
            let currentId = '';
            const scrollY = window.pageYOffset;
            const headings = Array.from(document.querySelectorAll('.ios-card h2, .ios-title-section h1'));

            for (let i = headings.length - 1; i >= 0; i--) {
              const heading = headings[i];
              if (heading.id) {
                if (scrollY >= (heading.getBoundingClientRect().top + window.pageYOffset - 100)) {
                  currentId = heading.id;
                  break;
                }
              }
            }

            if (currentId) {
              document.querySelectorAll('.ios-toc-item').forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('data-target-id') === currentId) {
                  item.classList.add('active');
                }
              });
            } else if (scrollY < 50 && headings.length > 0) {
              document.querySelectorAll('.ios-toc-item').forEach(item => item.classList.remove('active'));
              const firstItem = document.querySelector(`.ios-toc-item[data-target-id="${headings[0].id}"]`);
              if (firstItem) firstItem.classList.add('active');
            }
          };

          window.addEventListener('scroll', window.iosScrollSpy);
          window.iosScrollSpy();
        });
      }
      
    ]
  };
</script>

<script>
  function siteTime() {
    window.setTimeout("siteTime()", 1000);
    var t1 = Date.UTC(2026, 3, 22, 10, 0, 0);
    var today = new Date();
    var t2 = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate(), today.getHours(), today.getMinutes(), today.getSeconds());
    var diff = t2 - t1;

    var seconds = 1000, minutes = seconds * 60, hours = minutes * 60, days = hours * 24, years = days * 365;

    var diffYears = Math.floor(diff / years);
    var diffDays = Math.floor((diff / days) - diffYears * 365);
    var diffHours = Math.floor((diff - (diffYears * 365 + diffDays) * days) / hours);
    var diffMinutes = Math.floor((diff - (diffYears * 365 + diffDays) * days - diffHours * hours) / minutes);
    var diffSeconds = Math.floor((diff - (diffYears * 365 + diffDays) * days - diffHours * hours - diffMinutes * minutes) / seconds);

    var documentElement = document.getElementById("sitetime");
    if(documentElement) {
      documentElement.innerHTML = "本站已安全运行 " + diffYears + " 年 " + diffDays + " 天 " + diffHours + " 小时 " + diffMinutes + " 分 " + diffSeconds + " 秒 ";
    }
  }
  siteTime();
</script>

<div id="danmaku-controls">
  <button id="danmaku-send-btn" class="danmaku-btn" onclick="toggleDanmakuModal()">💬 发送弹幕</button>
  <button id="danmaku-switch" class="danmaku-btn">✨ 开启弹幕</button>
</div>
<div id="danmaku-container"></div>
<div id="twikoo-modal" class="danmaku-modal">
  <span class="twikoo-modal-close" onclick="closeDanmakuModal()" title="收起输入框">×</span>
  <h3 style="margin-top: 0; text-align: center; color: #333; font-size: 1.1em;">发射弹幕 🚀</h3>
  <div id="tcomment-cover"></div>
</div>

<script>
  const TWIKOO_ENV_ID = 'https://twikoo-backend-jwk0fa2se-fatswangs-projects.vercel.app';
  let danmakuActive = false;
  let danmakuTimer = null;
  let commentsData = [];

  const switchBtn = document.getElementById('danmaku-switch');
  const sendBtn = document.getElementById('danmaku-send-btn');
  const danmakuContainer = document.getElementById('danmaku-container');
  const modal = document.getElementById('twikoo-modal');
  let twikooCoverInited = false;

  function fetchComments() {
    twikoo.getRecentComments({ envId: TWIKOO_ENV_ID, pageSize: 50, includeReply: false })
            .then(function (res) {
              commentsData = res.map(item => {
                return { text: item.commentText || item.comment, avatar: item.avatar || 'https://cravatar.cn/avatar/?d=mp' };
              });
              if(danmakuActive && commentsData.length > 0 && !danmakuTimer) startDanmakuEngine();
            }).catch(err => console.error("获取弹幕失败:", err));
  }

  function shootDanmaku() {
    if (!danmakuActive || commentsData.length === 0) return;
    const data = commentsData[Math.floor(Math.random() * commentsData.length)];
    const el = document.createElement('div');
    el.className = 'danmaku-item';
    el.innerHTML = `<img src="${data.avatar}" class="danmaku-avatar" onerror="this.src='https://cravatar.cn/avatar/?d=mp'" /><span class="danmaku-text">${data.text}</span>`;
    el.style.bottom = (10 + Math.random() * 50) + '%';

    const colors = ['#ffffff', '#f8f9fa', '#e3f2fd', '#fff3e0', '#fce4ec'];
    el.querySelector('.danmaku-text').style.color = colors[Math.floor(Math.random() * colors.length)];

    const duration = 7 + Math.random() * 8;
    el.style.animation = `danmaku-move ${duration}s linear forwards`;
    danmakuContainer.appendChild(el);
    setTimeout(() => { el.remove(); }, duration * 1000);
  }

  function startDanmakuEngine() {
    if(danmakuTimer) clearInterval(danmakuTimer);
    danmakuTimer = setInterval(shootDanmaku, 1500);
  }

  switchBtn.addEventListener('click', () => {
    danmakuActive = !danmakuActive;
    if (danmakuActive) {
      switchBtn.innerText = '🚫 关闭弹幕';
      switchBtn.style.background = '#ff4757';
      sendBtn.style.display = 'block';
      danmakuContainer.style.display = 'block';
      fetchComments();
    } else {
      switchBtn.innerText = '✨ 开启弹幕';
      switchBtn.style.background = 'rgba(0, 123, 232, 0.9)';
      sendBtn.style.display = 'none';
      danmakuContainer.style.display = 'none';
      if(danmakuTimer) { clearInterval(danmakuTimer); danmakuTimer = null; }
      closeDanmakuModal();
    }
  });

  function toggleDanmakuModal() {
    const isOpening = !modal.classList.contains('active');
    if (isOpening) {
      modal.classList.add('active');
      sendBtn.innerText = '🔼 收起输入';
      if(!twikooCoverInited) {
        twikoo.init({ envId: TWIKOO_ENV_ID, el: '#tcomment-cover', path: '/cover-danmaku' });
        twikooCoverInited = true;
      }
    } else { closeDanmakuModal(); }
  }

  function closeDanmakuModal() {
    modal.classList.remove('active');
    sendBtn.innerText = '💬 发送弹幕';
  }

  setInterval(() => { if(danmakuActive) fetchComments(); }, 15000);

  document.body.addEventListener('click', function(e) {
    if (e.target.closest('.tk-submit-action') || e.target.closest('.el-button--primary')) {
      setTimeout(() => { fetchComments(); closeDanmakuModal(); }, 2000);
    }
  });
</script>
</body>
</html>
